services:
  - type: web
    name: pizza-admin-backend
    runtime: python-3.11
    region: oregon
    plan: standard
    buildCommand: |
      pip install -r backend/requirements.txt && \
      cd backend/backend_dj && \
      python manage.py migrate && \
      python manage.py collectstatic --noinput
    startCommand: |
      cd backend/backend_dj && \
      gunicorn backend_dj.wsgi:application \
        --bind 0.0.0.0:$PORT \
        --workers 2 \
        --worker-class sync \
        --timeout 60
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend_dj.settings
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: DEBUG
        value: "false"
      - key: SECURE_SSL_REDIRECT
        value: "true"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: CSRF_COOKIE_SECURE
        value: "true"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: pizza-admin-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pizza-admin-redis
          type: keyvalue
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FIREBASE_CONFIG_PATH
        value: /etc/secrets/firebase_config.json
    healthCheckPath: /api/health/

  - type: worker
    name: pizza-admin-worker
    runtime: python-3.11
    region: oregon
    plan: standard
    buildCommand: |
      pip install -r backend/requirements.txt
    startCommand: |
      cd backend/backend_dj && \
      celery -A backend_dj worker -l info --concurrency=2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend_dj.settings
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: pizza-admin-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pizza-admin-redis
          type: keyvalue
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FIREBASE_CONFIG_PATH
        value: /etc/secrets/firebase_config.json

  - type: keyvalue
    name: pizza-admin-redis
    region: oregon
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

databases:
  - name: pizza-admin-db
    postgresMajorVersion: "15"
    region: oregon
    plan: free
    databaseName: pizza_admin
    user: postgres
